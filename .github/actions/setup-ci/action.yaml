name: 'Setup CI'
description: 'Check out code, setup pnpm, and setup Node.js'

inputs:
  node-version:
    description: 'Override Node.js version (defaults to engines.node in package.json)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node.js (pinned)
      if: inputs.node-version != ''
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'pnpm'

    - name: Setup Node.js (from package.json)
      if: inputs.node-version == ''
      uses: actions/setup-node@v6
      with:
        node-version-file: 'package.json'
        cache: 'pnpm'

    - name: Install dependencies
      shell: bash
      # engineStrict rejects a pinned node-version override that doesn't match
      # engines.node in package.json (e.g. the Release job's Node 22 vs ^24.0.0).
      run: pnpm install --frozen-lockfile ${{ inputs.node-version != '' && '--config.engine-strict=false' || '' }}
