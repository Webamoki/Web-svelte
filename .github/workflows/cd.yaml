name: Release

on:
  push:
    branches:
      - main

jobs:
  checks:
    uses: ./.github/workflows/ci.yaml

  pages:
    uses: ./.github/workflows/pages.yaml
    needs: [checks]

  version-and-publish:
    name: Release
    runs-on: ubuntu-latest
    needs: [checks]
    permissions:
      contents: write # Required for tags/releases

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for release notes and tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Git Tag (e.g., v1, v2, v3)
          tag_name: v${{ github.run_number }}
          # Release Title
          name: Release v${{ github.run_number }}
          generate_release_notes: true # Automatic notes
          draft: false
          prerelease: false
